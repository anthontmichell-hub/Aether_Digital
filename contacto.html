<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Aether Tab</title>
    <script src="https://cdn.tailwindcss.com"></script> 
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            filter: blur(10px);
            animation: revealIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes revealIn {
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }

        input, select, textarea {
            background: rgba(255, 255, 255, 0.03) !important;
            backdrop-filter: blur(5px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        input:focus, select:focus, textarea:focus {
            background: rgba(191, 0, 255, 0.05) !important;
            border-color: #BF00FF !important;
            box-shadow: 0 0 20px rgba(191, 0, 255, 0.2), inset 0 0 10px rgba(191, 0, 255, 0.1);
            transform: translateY(-2px);
        }

        .btn-aether {
            background: linear-gradient(90deg, #FF3131, #BF00FF);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .btn-aether:hover {
            box-shadow: 0 0 30px rgba(255, 49, 49, 0.4);
            letter-spacing: 0.2em;
            filter: brightness(1.2);
        }
        select option { background: #0a0a0a; color: white; }
    </style>
</head>
<body class="bg-transparent text-white font-['Plus_Jakarta_Sans'] overflow-x-hidden">
    <canvas id="canvas-bg" class="fixed top-0 left-0 w-full h-full -z-20 pointer-events-none"></canvas>
    <canvas id="matrix-canvas" class="fixed top-0 right-0 w-full md:w-1/2 h-full -z-10 opacity-20 pointer-events-none" style="mask-image: linear-gradient(to left, black, transparent); -webkit-mask-image: linear-gradient(to left, black, transparent);"></canvas>

    <div id="navbar-placeholder"></div>

    <main class="min-h-screen pt-32 pb-20 px-6 max-w-7xl mx-auto flex flex-col items-center relative z-10">
        <div class="text-center mb-16 reveal">
            <h2 class="text-[#FF3131] text-[10px] font-black uppercase tracking-[0.5em] mb-4">Interfaz de Enlace</h2>
            <h1 class="text-5xl md:text-7xl font-bold mb-6 tracking-tighter">
                Inicia la <span class="aether-gradient-text">Transformación.</span>
            </h1>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 w-full">
            <div class="flex flex-col justify-center space-y-8 reveal delay-1">
                <div class="glass-card p-8 group border border-white/10 rounded-2xl">
                    <span class="text-[#00E5FF] text-[10px] font-bold uppercase tracking-widest block mb-2">Canal Directo</span>
                    <h3 class="text-2xl font-bold mb-4">Consultoría Estratégica</h3>
                    <p class="text-gray-400 font-light leading-relaxed mb-6">Optimiza tus flujos de trabajo con ingeniería de software de precisión.</p>
                    <div class="flex flex-col gap-4">
                        <a href="#" class="flex items-center gap-4 text-gray-300 hover:text-[#00E5FF] transition-all"><i class="fas fa-envelope"></i> aethertab@aether.tab</a>
                    </div>
                </div>
            </div>

            <div class="glass-card p-10 shadow-2xl backdrop-blur-xl reveal delay-2 border border-white/10 rounded-2xl">
                <form id="contactForm" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-widest text-gray-500 font-bold ml-1">Nombre</label>
                            <input type="text" id="nombre" required placeholder="Tu nombre" class="w-full border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none text-white placeholder:text-gray-600">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-widest text-gray-500 font-bold ml-1">Servicio</label>
                            <select id="servicio" class="w-full bg-[#0a0a0a] border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none text-gray-400 cursor-pointer">
                                <option>Desarrollo Web</option>
                                <option>Sistemas ERP</option>
                                <option>Inteligencia de Datos</option>
                            </select>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase tracking-widest text-gray-500 font-bold ml-1">Mensaje</label>
                        <textarea id="mensaje" rows="4" required placeholder="¿En qué podemos ayudarte?" class="w-full border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none text-white placeholder:text-gray-600"></textarea>
                    </div>
                    <button type="submit" class="btn-aether w-full py-4 rounded-xl uppercase tracking-[0.2em] text-[10px] font-bold text-white active:scale-95 transition-all">
                        Enviar Solicitud
                    </button>
                </form>
            </div>
        </div>

        <div id="terminal-overlay" class="fixed inset-0 z-[1000] bg-black/95 backdrop-blur-md hidden flex items-center justify-center p-4">
            <div class="glass-card w-full max-w-md p-6 border-[#BF00FF]/30 shadow-[0_0_50px_rgba(191,0,255,0.2)] rounded-xl border">
                <div class="flex items-center gap-2 mb-4 border-b border-white/10 pb-2">
                    <div class="w-3 h-3 rounded-full bg-[#FF3131]"></div>
                    <div class="w-3 h-3 rounded-full bg-[#00E5FF]"></div>
                    <span class="text-[10px] uppercase tracking-widest text-gray-500 font-bold">Aether_Core_Terminal.exe</span>
                </div>
                <div id="terminal-body" class="font-mono text-[12px] space-y-2"></div>
            </div>
        </div>
    </main>

    <script src="js/matrix.js"></script>
    <script src="js/electrons.js"></script>
    <script src="js/main.js"></script>
    
    <script>
        const form = document.getElementById('contactForm');
        const overlay = document.getElementById('terminal-overlay');
        const terminalBody = document.getElementById('terminal-body');

        form.addEventListener('submit', function(e) {
    e.preventDefault();
    
    // Capturamos los datos (asegúrate de que los IDs coincidan con tu HTML)
    const datosFormulario = {
        nombre: document.getElementById('nombre')?.value || "Anónimo",
        email: document.getElementById('email')?.value || "Sin email", // Cambié 'servicio' por 'email' si es el caso
        mensaje: document.getElementById('mensaje')?.value || "Sin mensaje"
    };

    overlay.classList.remove('hidden');
    overlay.classList.add('flex');
    terminalBody.innerHTML = ''; // Limpiamos el terminal antes de empezar

    const lines = [
        { text: "> Iniciando protocolo de enlace...", color: "text-gray-400" },
        { text: "> Encriptando datos del usuario...", color: "text-gray-400" },
        { text: "> Bypass de cortafuegos Aether... [OK]", color: "text-[#00E5FF]" },
        { text: "> Sincronizando con Núcleo Render...", color: "text-gray-400" }
    ];

    let i = 0;
    const printLine = () => {
        if (i < lines.length) {
            const p = document.createElement('p');
            p.className = lines[i].color + " reveal";
            p.innerText = lines[i].text;
            terminalBody.appendChild(p);
            i++;
            setTimeout(printLine, 600);
        } else {
            // --- CONEXIÓN REAL CON RENDER ---
            fetch('https://aether-digital.onrender.com/enlace', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datosFormulario)
            })
            .then(res => res.json())
            .then(data => {
                const ok = document.createElement('p');
                // Color verde neón para el éxito
                ok.className = "text-[#4ADE80] font-bold mt-2 reveal"; 
                ok.innerText = "> ENLACE ESTABLECIDO: Transmisión Exitosa";
                terminalBody.appendChild(ok);
                
                // Mensaje final del servidor
                const msg = document.createElement('p');
                msg.className = "text-white text-xs opacity-70";
                msg.innerText = "Respuesta: " + data.mensaje_servidor;
                terminalBody.appendChild(msg);

                setTimeout(() => { location.reload(); }, 4000);
            })
            .catch(() => {
                const err = document.createElement('p');
                err.className = "text-yellow-500 reveal";
                err.innerText = "> ERROR: Fallo de enlace crítico. Reintentando...";
                terminalBody.appendChild(err);
                setTimeout(() => { overlay.classList.add('hidden'); }, 3000);
            });
        }
    };
    printLine();
});
    </script>
</body>
</html>
